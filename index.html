<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Nova News Briefing</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			tailwind.config = {
				theme: {
					extend: {
						fontFamily: {
							sans: ['"Manrope"', "ui-sans-serif", "system-ui", "sans-serif"],
						},
						colors: {
							ink: "#0f172a",
							mist: "#f8fafc",
							accent: "#0f766e",
							accentSoft: "#ccfbf1",
						},
						boxShadow: {
							card: "0 10px 30px rgba(15, 23, 42, 0.08)",
							lift: "0 18px 42px rgba(15, 23, 42, 0.12)",
						},
					},
				},
			};
		</script>
		<style>
			:root {
				--surface: rgba(255, 255, 255, 0.86);
				--stroke: rgba(15, 23, 42, 0.1);
			}

			body {
				background:
					radial-gradient(circle at 0% 0%, rgba(20, 184, 166, 0.12), transparent 40%),
					radial-gradient(circle at 100% 0%, rgba(59, 130, 246, 0.1), transparent 35%),
					linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
			}

			.glass-card {
				background: var(--surface);
				border: 1px solid var(--stroke);
				backdrop-filter: blur(8px);
			}

			.reveal {
				animation: reveal 0.35s ease-out;
			}

			@keyframes reveal {
				from {
					opacity: 0;
					transform: translateY(10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
		<link
			rel="preconnect"
			href="https://fonts.googleapis.com"
		/>
		<link
			rel="preconnect"
			href="https://fonts.gstatic.com"
			crossorigin
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
		<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
		<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	</head>
	<body class="bg-slate-50 text-slate-900 antialiased">
		<div id="root"></div>

		<script type="text/babel">
			const { useEffect, useMemo, useRef, useState } = React;
			const USERS_STORAGE_KEY = "novaUsers";
			const SESSION_STORAGE_KEY = "novaSession";
			const RATING_TOTALS_STORAGE_KEY = "novaRatingTotals";

			const TOPICS = ["Tech", "Politics", "Business", "Health", "World", "Science"];

			const ARTICLES = [
				{
					id: 1,
					headline: "Global chip makers announce joint AI safety standards",
					source: "The Ledger",
					category: "Tech",
					timestamp: "2h ago",
					summary:
						"Major semiconductor firms agreed on shared testing practices for next-gen AI chips. The standards focus on reliability, heat control, and transparent reporting for enterprise buyers.",
					bias: "Center",
					biasExplanation: "Center - mostly factual language with balanced expert quotes.",
					whatHappened:
						"Five leading chip manufacturers signed a voluntary framework for benchmarking AI hardware safety and stability.",
					whyItMatters:
						"Common standards can reduce deployment risk and make product claims easier for regulators and buyers to verify.",
					keyFacts: [
						"Applies to data-center and edge AI chips",
						"Includes quarterly public audit summaries",
						"First cross-vendor agreement in this segment",
					],
					fullUrl: "#",
				},
				{
					id: 2,
					headline: "City council approves public transit expansion after heated vote",
					source: "Metro Daily",
					category: "Politics",
					timestamp: "4h ago",
					summary:
						"A long-debated transit package passed by a narrow margin. Supporters cited commute relief, while critics argued projected costs are understated.",
					bias: "Left",
					biasExplanation: "Slight Left - uses emotionally charged language when discussing opposition concerns.",
					whatHappened:
						"Council members voted 6-5 to fund two new rail lines and upgrades to existing bus routes.",
					whyItMatters:
						"The decision shapes commuting access, municipal debt levels, and neighborhood development for the next decade.",
					keyFacts: [
						"Estimated budget: $3.2B over 8 years",
						"Public referendum expected this fall",
						"Construction may begin early next year",
					],
					fullUrl: "#",
				},
				{
					id: 3,
					headline: "Central bank signals possible pause in rate changes",
					source: "Market Brief",
					category: "Business",
					timestamp: "6h ago",
					summary:
						"Officials indicated inflation progress is improving but not complete. Markets reacted cautiously as analysts adjusted expectations for the next quarter.",
					bias: "Center",
					biasExplanation: "Center - neutral framing and broad source diversity.",
					whatHappened:
						"In a policy statement, the central bank hinted it may hold rates steady if inflation data continues to cool.",
					whyItMatters:
						"Borrowing costs influence household spending, startup funding, and business expansion plans.",
					keyFacts: [
						"Inflation fell for three consecutive months",
						"No immediate rate cut announced",
						"Next policy meeting is in six weeks",
					],
					fullUrl: "#",
				},
				{
					id: 4,
					headline: "Regional hospitals adopt unified emergency triage protocol",
					source: "HealthScope",
					category: "Health",
					timestamp: "8h ago",
					summary:
						"A new shared triage system is rolling out across major hospitals to improve wait times and prioritize severe cases more consistently.",
					bias: "Right",
					biasExplanation: "Slight Right - emphasizes operational efficiency over patient access concerns.",
					whatHappened:
						"Hospital networks agreed to implement a common emergency triage framework and digital intake process.",
					whyItMatters:
						"Standardized triage can reduce variability in urgent care and improve staffing decisions during peak demand.",
					keyFacts: [
						"Pilot showed 12% faster urgent case routing",
						"Rollout starts with 18 hospitals",
						"Public dashboard planned for performance tracking",
					],
					fullUrl: "#",
				},
				{
					id: 5,
					headline: "Ceasefire talks resume as humanitarian routes reopen",
					source: "World Wire",
					category: "World",
					timestamp: "11h ago",
					summary:
						"Negotiators resumed talks after weeks of stalled communication. Aid agencies report limited access to previously blocked supply routes.",
					bias: "Center",
					biasExplanation: "Center - cautious wording and clear separation between verified facts and official claims.",
					whatHappened:
						"Mediators reconvened delegations for a new negotiation round while temporary aid corridors reopened.",
					whyItMatters:
						"The talks affect civilian safety, regional stability, and the pace of humanitarian relief deliveries.",
					keyFacts: [
						"Two corridors reopened under monitoring",
						"No final agreement yet",
						"UN observers involved in verification",
					],
					fullUrl: "#",
				},
				{
					id: 6,
					headline: "New battery recycling method cuts rare metal waste",
					source: "Science Line",
					category: "Science",
					timestamp: "13h ago",
					summary:
						"Researchers reported a process that recovers key battery materials with higher purity and lower energy use than conventional methods.",
					bias: "Left",
					biasExplanation: "Slight Left - optimistic framing around policy impact with fewer counterpoints.",
					whatHappened:
						"A university-industry team published results from a pilot battery recycling method using low-temperature extraction.",
					whyItMatters:
						"Improved recycling could lower supply risks and reduce environmental pressure from new mining demand.",
					keyFacts: [
						"Recovery rate reached 91% in pilot tests",
						"Energy use reduced by around 18%",
						"Scale-up trial planned for next year",
					],
					fullUrl: "#",
				},
				{
					id: 7,
					headline: "Cloud provider unveils privacy tools for small businesses",
					source: "Tech Current",
					category: "Tech",
					timestamp: "15h ago",
					summary:
						"A new package bundles encryption defaults, audit logs, and alerting tools aimed at smaller teams with limited security staff.",
					bias: "Right",
					biasExplanation: "Slight Right - highlights market freedom narrative with less attention to regulation arguments.",
					whatHappened:
						"The provider launched a simplified privacy toolkit targeted at startups and small-to-mid businesses.",
					whyItMatters:
						"Lowering privacy setup complexity can help smaller organizations meet compliance requirements sooner.",
					keyFacts: [
						"Includes prebuilt policy templates",
						"Pricing starts at a low monthly tier",
						"Available in 12 regions at launch",
					],
					fullUrl: "#",
				},
				{
					id: 8,
					headline: "Shipping costs fall as major ports clear backlogs",
					source: "Business Post",
					category: "Business",
					timestamp: "18h ago",
					summary:
						"Port congestion eased across several trade hubs, reducing average container delays and improving delivery timelines for retailers.",
					bias: "Center",
					biasExplanation: "Center - reports trend data with minimal editorial language.",
					whatHappened:
						"Port authorities reported sustained throughput gains, allowing backlog levels to drop below seasonal averages.",
					whyItMatters:
						"Lower logistics pressure can reduce costs for importers and improve product availability for consumers.",
					keyFacts: [
						"Average delay down 22% month-over-month",
						"Fuel surcharge trends remain mixed",
						"Retail restocking expected to accelerate",
					],
					fullUrl: "#",
				},
			];

			const biasStyles = {
				Left: "bg-blue-100 text-blue-700",
				Center: "bg-slate-200 text-slate-700",
				Right: "bg-red-100 text-red-700",
			};

			function readJsonStorage(key, fallbackValue) {
				try {
					const raw = localStorage.getItem(key);
					return raw ? JSON.parse(raw) : fallbackValue;
				} catch {
					return fallbackValue;
				}
			}

			function writeJsonStorage(key, value) {
				localStorage.setItem(key, JSON.stringify(value));
			}

			function BiasBadge({ bias, onClick, count, disabled }) {
				return (
					<button
						onClick={onClick}
						disabled={disabled}
						className={`inline-flex items-center gap-2 rounded-full px-3 py-1 text-xs font-semibold transition ${
							biasStyles[bias] || biasStyles.Center
						} ${disabled ? "cursor-not-allowed opacity-60" : "hover:opacity-90"}`}
						aria-label={
							disabled
								? `Bias: ${bias}. You already rated this article.`
								: `Bias: ${bias}. Rate this article.`
						}
					>
						<span>{bias}</span>
						<span className="rounded-full bg-white/80 px-2 py-0.5 text-[10px] font-bold">{count}</span>
					</button>
				);
			}

			function AuthScreen({ onLogin }) {
				const [mode, setMode] = useState("signin");
				const [name, setName] = useState("");
				const [email, setEmail] = useState("");
				const [password, setPassword] = useState("");
				const [error, setError] = useState("");

				function handleSubmit(event) {
					event.preventDefault();
					setError("");

					const cleanedName = name.trim();
					const cleanedEmail = email.trim().toLowerCase();

					if (!cleanedEmail || !password) {
						setError("Email and password are required.");
						return;
					}

					const users = readJsonStorage(USERS_STORAGE_KEY, []);
					const existingUser = users.find((user) => user.email === cleanedEmail);

					if (mode === "signup") {
						if (!cleanedName) {
							setError("Full name is required for sign up.");
							return;
						}
						if (password.length < 6) {
							setError("Password must be at least 6 characters.");
							return;
						}
						if (existingUser) {
							setError("An account with this email already exists.");
							return;
						}

						const newUser = {
							name: cleanedName,
							email: cleanedEmail,
							password,
						};

						writeJsonStorage(USERS_STORAGE_KEY, [...users, newUser]);
						writeJsonStorage(SESSION_STORAGE_KEY, { name: newUser.name, email: newUser.email });
						onLogin({ name: newUser.name, email: newUser.email });
						return;
					}

					if (!existingUser || existingUser.password !== password) {
						setError("Invalid email or password.");
						return;
					}

					writeJsonStorage(SESSION_STORAGE_KEY, { name: existingUser.name, email: existingUser.email });
					onLogin({ name: existingUser.name, email: existingUser.email });
				}

				return (
					<div className="mx-auto flex min-h-screen w-full max-w-5xl flex-col justify-center p-4 sm:p-6 lg:p-8">
						<div className="glass-card reveal grid overflow-hidden rounded-3xl shadow-lift lg:grid-cols-[1fr_1fr]">
							<div className="p-6 sm:p-8">
								<p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Nova Account</p>
								<h1 className="mt-2 text-3xl font-extrabold leading-tight text-ink">Welcome back</h1>
								<p className="mt-2 text-sm text-slate-600">Sign in or create an account to save your activity and ratings.</p>

								<div className="mt-6 inline-flex rounded-xl bg-slate-100 p-1">
									<button
										type="button"
										onClick={() => {
											setMode("signin");
											setError("");
										}}
										className={`rounded-lg px-4 py-2 text-sm font-semibold transition ${
											mode === "signin" ? "bg-white text-ink shadow-sm" : "text-slate-600"
										}`}
									>
										Sign in
									</button>
									<button
										type="button"
										onClick={() => {
											setMode("signup");
											setError("");
										}}
										className={`rounded-lg px-4 py-2 text-sm font-semibold transition ${
											mode === "signup" ? "bg-white text-ink shadow-sm" : "text-slate-600"
										}`}
									>
										Sign up
									</button>
								</div>

								<form onSubmit={handleSubmit} className="mt-5 space-y-4">
									{mode === "signup" && (
										<label className="block">
											<span className="mb-1 block text-sm font-semibold text-slate-700">Full name</span>
											<input
												type="text"
												value={name}
												onChange={(event) => setName(event.target.value)}
												className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-teal-500 transition focus:ring-2"
												placeholder="Avery Carter"
											/>
										</label>
									)}

									<label className="block">
										<span className="mb-1 block text-sm font-semibold text-slate-700">Email</span>
										<input
											type="email"
											value={email}
											onChange={(event) => setEmail(event.target.value)}
											className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-teal-500 transition focus:ring-2"
											placeholder="you@company.com"
										/>
									</label>

									<label className="block">
										<span className="mb-1 block text-sm font-semibold text-slate-700">Password</span>
										<input
											type="password"
											value={password}
											onChange={(event) => setPassword(event.target.value)}
											className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-teal-500 transition focus:ring-2"
											placeholder="••••••••"
										/>
									</label>

									{error && <p className="rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">{error}</p>}

									<button
										type="submit"
										className="w-full rounded-xl bg-ink px-4 py-3 text-sm font-semibold text-white shadow-card transition hover:opacity-95"
									>
										{mode === "signup" ? "Create account" : "Sign in"}
									</button>
								</form>
							</div>

							<div className="hidden bg-gradient-to-br from-teal-50 to-sky-100 p-8 lg:block">
								<p className="text-xs font-semibold uppercase tracking-[0.2em] text-teal-800">Secure Feed</p>
								<h2 className="mt-3 text-2xl font-extrabold text-slate-900">Professional news workflow for daily decisions.</h2>
								<ul className="mt-4 space-y-2 text-sm text-slate-700">
									<li>Personalized topic feed</li>
									<li>Per-article one-time rating controls</li>
									<li>Persistent sign-in session in this browser</li>
								</ul>
							</div>
						</div>
					</div>
				);
			}

			function TopicSelection({ selectedTopics, setSelectedTopics, onContinue }) {
				function toggleTopic(topic) {
					setSelectedTopics((prev) =>
						prev.includes(topic) ? prev.filter((t) => t !== topic) : [...prev, topic]
					);
				}

				return (
					<div className="mx-auto flex min-h-screen w-full max-w-5xl flex-col justify-center p-4 sm:p-6 lg:p-8">
						<div className="glass-card reveal grid overflow-hidden rounded-3xl shadow-lift lg:grid-cols-[1.1fr_0.9fr]">
							<div className="p-6 sm:p-8">
								<p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Nova Setup</p>
								<h1 className="mt-2 text-3xl font-extrabold leading-tight text-ink">Choose topics you care about</h1>
							<p className="mt-2 text-sm text-slate-600">
								We will personalize your feed with concise, structured summaries.
							</p>

							<div className="mt-6 grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-2">
								{TOPICS.map((topic) => {
									const checked = selectedTopics.includes(topic);
									return (
										<label
											key={topic}
											className={`flex cursor-pointer items-center gap-2 rounded-xl border p-3 text-sm font-semibold transition ${
												checked
													? "border-accent bg-accent text-white shadow-card"
													: "border-slate-200 bg-white text-slate-700 hover:border-slate-300"
											}`}
										>
											<input
												type="checkbox"
												className="h-4 w-4 accent-teal-700"
												checked={checked}
												onChange={() => toggleTopic(topic)}
											/>
											{topic}
										</label>
									);
								})}
							</div>

							<button
								onClick={onContinue}
								className="mt-6 w-full rounded-xl bg-ink px-4 py-3 text-sm font-semibold text-white shadow-card transition hover:opacity-95"
							>
								Continue to Feed
							</button>
							</div>

							<div className="hidden bg-gradient-to-br from-teal-50 to-sky-100 p-8 lg:block">
								<p className="text-xs font-semibold uppercase tracking-[0.2em] text-teal-800">Product Brief</p>
								<h2 className="mt-3 text-2xl font-extrabold text-slate-900">Professional daily briefing, without noise.</h2>
								<p className="mt-3 text-sm leading-relaxed text-slate-700">
									Each card includes source context, concise summaries, and an explicit bias indicator for faster trust checks.
								</p>
							</div>
						</div>
					</div>
				);
			}

			function FeedCard({ article, onOpen, onBiasClick, biasClickCount, isRated }) {
				return (
					<article className="glass-card reveal rounded-2xl p-5 shadow-card transition hover:-translate-y-0.5 hover:shadow-lift">
						<div className="mb-3 flex items-start justify-between gap-3">
							<div>
								<p className="text-xs font-semibold uppercase tracking-wide text-slate-500">{article.category}</p>
								<p className="text-xs text-slate-400">{article.source}</p>
							</div>
							<BiasBadge bias={article.bias} onClick={onBiasClick} count={biasClickCount} disabled={isRated} />
						</div>

						<button
							onClick={onOpen}
							className="text-left"
							aria-label={`Open article summary: ${article.headline}`}
						>
							<h2 className="text-base font-bold leading-snug text-slate-900">{article.headline}</h2>
							<p
								className="mt-2 text-sm leading-relaxed text-slate-600"
								style={{
									display: "-webkit-box",
									WebkitLineClamp: 3,
									WebkitBoxOrient: "vertical",
									overflow: "hidden",
								}}
							>
								{article.summary}
							</p>
							<span className="mt-3 inline-block text-xs font-semibold text-ink">Open summary</span>
							{isRated && <p className="mt-2 text-xs font-medium text-teal-700">Rated by you</p>}
						</button>
					</article>
				);
			}

			function HomeFeed({
				articles,
				selectedTopics,
				setScreen,
				setActiveArticle,
				ratingTotals,
				onRateArticle,
				ratedArticleIds,
				currentUser,
				onSignOut,
			}) {
				const filteredArticles = useMemo(() => {
					if (!selectedTopics.length) {
						return articles;
					}
					return articles.filter((article) => selectedTopics.includes(article.category));
				}, [articles, selectedTopics]);

				function openArticle(article) {
					setActiveArticle(article);
					setScreen("detail");
				}

				return (
					<div className="mx-auto min-h-screen w-full max-w-5xl p-4 pb-10 sm:p-6">
						<header className="glass-card mb-5 rounded-2xl p-5 shadow-card sm:p-6">
							<div className="flex items-center justify-between gap-3">
								<p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">Nova</p>
								<button
									onClick={onSignOut}
									className="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-700 transition hover:bg-slate-200"
								>
									Sign out
								</button>
							</div>
							<h1 className="mt-1 text-2xl font-extrabold text-ink">Today’s Briefings</h1>
							<p className="mt-1 text-sm font-medium text-slate-700">Signed in as {currentUser.name}</p>
							<p className="mt-1 text-sm text-slate-600">
								Trusted summaries with bias indicators, personalized by topic.
							</p>
							<div className="mt-3 flex flex-wrap gap-2">
								{(selectedTopics.length ? selectedTopics : ["All Topics"]).map((topic) => (
									<span
										key={topic}
										className="rounded-full bg-accentSoft px-3 py-1 text-xs font-semibold text-teal-900"
									>
										{topic}
									</span>
								))}
							</div>
						</header>

						<main className="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
							{filteredArticles.length ? (
								filteredArticles.map((article) => (
									<FeedCard
										key={article.id}
										article={article}
										onOpen={() => openArticle(article)}
										onBiasClick={() => onRateArticle(article.id)}
										biasClickCount={ratingTotals[article.id] || 0}
										isRated={Boolean(ratedArticleIds[article.id])}
									/>
								))
							) : (
								<div className="glass-card rounded-2xl p-5 text-center shadow-card sm:col-span-2 xl:col-span-3">
									<p className="text-sm font-semibold text-slate-800">No articles match your selected topics.</p>
									<p className="mt-1 text-sm text-slate-600">Try choosing additional interests on setup reload.</p>
								</div>
							)}
						</main>
					</div>
				);
			}

			function ArticleDetail({ article, onBack, ratingTotals, onRateArticle, ratedArticleIds }) {
				if (!article) {
					return null;
				}

				return (
					<div className="mx-auto min-h-screen w-full max-w-4xl p-4 pb-10 sm:p-6">
						<button
							onClick={onBack}
							className="glass-card mb-4 rounded-full px-4 py-2 text-sm font-semibold text-slate-700 shadow-card"
						>
							Back to Feed
						</button>

						<article className="glass-card reveal rounded-3xl p-6 shadow-lift sm:p-7">
							<p className="text-xs font-semibold uppercase tracking-wide text-slate-500">{article.category}</p>
							<h1 className="mt-2 text-3xl font-extrabold leading-tight text-ink">{article.headline}</h1>
							<p className="mt-2 text-sm text-slate-500">
								{article.source} · {article.timestamp}
							</p>

							<div className="mt-5 space-y-4 text-sm leading-relaxed text-slate-700">
								<section>
									<h2 className="text-base font-bold text-slate-900">What happened</h2>
									<p className="mt-1">{article.whatHappened}</p>
								</section>

								<section>
									<h2 className="text-base font-bold text-slate-900">Why it matters</h2>
									<p className="mt-1">{article.whyItMatters}</p>
								</section>

								<section>
									<h2 className="text-base font-bold text-slate-900">Key facts</h2>
									<ul className="mt-1 list-disc space-y-1 pl-5">
										{article.keyFacts.map((fact) => (
											<li key={fact}>{fact}</li>
										))}
									</ul>
								</section>
							</div>

							<section className="mt-6 rounded-2xl bg-slate-50/95 p-4">
								<h3 className="text-sm font-bold text-slate-900">Bias Rating</h3>
								<p className="mt-2 text-sm text-slate-700">{article.biasExplanation}</p>
								<div className="mt-3">
									<BiasBadge
										bias={article.bias}
										onClick={() => onRateArticle(article.id)}
										count={ratingTotals[article.id] || 0}
										disabled={Boolean(ratedArticleIds[article.id])}
									/>
									{ratedArticleIds[article.id] && (
										<p className="mt-2 text-xs font-medium text-teal-700">You already rated this article.</p>
									)}
								</div>
							</section>

							<a
								href={article.fullUrl}
								className="mt-6 inline-block text-sm font-semibold text-slate-900 underline decoration-2 underline-offset-4"
							>
								Read full article
							</a>
						</article>
					</div>
				);
			}

			function LoadingScreen() {
				return (
					<div className="mx-auto flex min-h-screen w-full max-w-2xl items-center justify-center p-6">
						<div className="glass-card w-full rounded-3xl p-6 shadow-card">
							<div className="animate-pulse space-y-4">
								<div className="h-3 w-24 rounded bg-slate-200"></div>
								<div className="h-7 w-3/4 rounded bg-slate-200"></div>
								<div className="h-20 w-full rounded-xl bg-slate-200"></div>
								<div className="h-20 w-full rounded-xl bg-slate-200"></div>
							</div>
							<p className="mt-4 text-sm font-medium text-slate-500">Loading personalized feed...</p>
						</div>
					</div>
				);
			}

			function App() {
				const [screen, setScreen] = useState("loading");
				const [selectedTopics, setSelectedTopics] = useState([]);
				const [activeArticle, setActiveArticle] = useState(null);
				const [currentUser, setCurrentUser] = useState(null);
				const [ratingTotals, setRatingTotals] = useState({});
				const [ratedArticleIds, setRatedArticleIds] = useState({});
				const timersRef = useRef([]);

				function queueTimeout(callback, delayMs) {
					const id = setTimeout(callback, delayMs);
					timersRef.current.push(id);
				}

				useEffect(() => {
					const session = readJsonStorage(SESSION_STORAGE_KEY, null);
					const totals = readJsonStorage(RATING_TOTALS_STORAGE_KEY, {});
					setRatingTotals(totals);

					if (session && session.email) {
						setCurrentUser(session);
						setRatedArticleIds(readJsonStorage(`novaUserRatings:${session.email}`, {}));
					}

					queueTimeout(() => {
						setScreen(session && session.email ? "topics" : "auth");
					}, 1100);

					return () => {
						timersRef.current.forEach((timerId) => clearTimeout(timerId));
						timersRef.current = [];
					};
				}, []);

				function continueToFeed() {
					setScreen("loading");
					queueTimeout(() => {
						setScreen("feed");
					}, 900);
				}

				function handleLogin(user) {
					setCurrentUser(user);
					setRatedArticleIds(readJsonStorage(`novaUserRatings:${user.email}`, {}));
					setScreen("topics");
				}

				function handleSignOut() {
					localStorage.removeItem(SESSION_STORAGE_KEY);
					setCurrentUser(null);
					setRatedArticleIds({});
					setSelectedTopics([]);
					setActiveArticle(null);
					setScreen("auth");
				}

				function handleRateArticle(articleId) {
					if (!currentUser || ratedArticleIds[articleId]) {
						return;
					}

					const nextRatedByUser = {
						...ratedArticleIds,
						[articleId]: true,
					};
					setRatedArticleIds(nextRatedByUser);
					writeJsonStorage(`novaUserRatings:${currentUser.email}`, nextRatedByUser);

					const nextTotals = {
						...ratingTotals,
						[articleId]: (ratingTotals[articleId] || 0) + 1,
					};
					setRatingTotals(nextTotals);
					writeJsonStorage(RATING_TOTALS_STORAGE_KEY, nextTotals);
				}

				return (
					<div className="min-h-screen">
						{screen === "loading" && <LoadingScreen />}

						{screen === "auth" && <AuthScreen onLogin={handleLogin} />}

						{screen === "topics" && (
							<TopicSelection
								selectedTopics={selectedTopics}
								setSelectedTopics={setSelectedTopics}
								onContinue={continueToFeed}
							/>
						)}

						{screen === "feed" && (
							<HomeFeed
								articles={ARTICLES}
								selectedTopics={selectedTopics}
								setScreen={setScreen}
								setActiveArticle={setActiveArticle}
								ratingTotals={ratingTotals}
								onRateArticle={handleRateArticle}
								ratedArticleIds={ratedArticleIds}
								currentUser={currentUser}
								onSignOut={handleSignOut}
							/>
						)}

						{screen === "detail" && (
							<ArticleDetail
								article={activeArticle}
								onBack={() => setScreen("feed")}
								ratingTotals={ratingTotals}
								onRateArticle={handleRateArticle}
								ratedArticleIds={ratedArticleIds}
							/>
						)}
					</div>
				);
			}

			ReactDOM.createRoot(document.getElementById("root")).render(<App />);
		</script>
	</body>
</html>
